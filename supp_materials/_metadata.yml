# Date format
date-format: "dddd, MMMM D, YYYY"

# Enable banner style title blocks
title-block-banner: "#cdd99a"

# Add blog-post class to the banner header area
format: 
  html:
    code-tools: true
    quarto-template-params:
      banner-header-class: "blog-post"

# Default for table of contents
toc: true
toc-title: Contents
toc-location: left

freeze: true

# Default author
author:
  - name: Lucas Watson
    url: https://lcwat.github.io/lcwww_repo/
    orcid: 0009-0002-0637-4612
